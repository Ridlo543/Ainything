# Kubernetes ConfigMap for Prometheus
# Alerting rules and configuration

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: lingua
  labels:
    app: prometheus
data:
  rules.yml: |
    groups:
      - name: lingua-alerts
        rules:
          - alert: HighErrorRate
            expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.01
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High error rate detected"
              description: "Error rate is above 1% for the last 5 minutes"

          - alert: HighLatency
            expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High latency detected"
              description: "P95 latency is above 2 seconds for the last 5 minutes"

          - alert: HighMemoryUsage
            expr: go_memstats_heap_inuse_bytes / go_memstats_heap_alloc_bytes > 0.8
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage detected"
              description: "Memory usage is above 80% for the last 5 minutes"

          - alert: HighCPUUsage
            expr: rate(process_cpu_seconds_total[5m]) > 0.8
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High CPU usage detected"
              description: "CPU usage is above 80% for the last 5 minutes"

---
# AlertManager configuration (optional)
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: lingua
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'severity']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'default-receiver'
    receivers:
      - name: 'default-receiver'
        webhook_configs:
          - url: 'http://alertmanager-webhook:9093/webhook'
            send_resolved: true
