# Prometheus Configuration for Lingua

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'lingua'
    static_configs:
      - targets: ['lingua:3000']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 10s

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:9187']
    scrape_interval: 15s

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121']
    scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

storage:
  tsdb:
    path: /data/prometheus
    retention: 30d
