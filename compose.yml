# ainything local infrastructure.
# Works with both `docker compose` and `podman compose` (Compose Spec v2).
# Podman is the default runtime used by `pnpm infra:*` scripts. See scripts/infra.mjs
# for the runtime-detection wrapper, and docs/Technical_Specification.md §3 for
# why we picked Podman-first for local development.
name: ainything

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ainything-postgres
    environment:
      POSTGRES_DB: ainything
      POSTGRES_USER: ainything
      POSTGRES_PASSWORD: ainything
    ports:
      - '5432:5432'
    volumes:
      - ainything-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ainything -d ainything']
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      org.opencontainers.image.title: ainything-postgres
      org.opencontainers.image.description: Local PostgreSQL 16 with pgvector for ainything

  redis:
    image: redis:7-alpine
    container_name: ainything-redis
    ports:
      - '6379:6379'
    volumes:
      - ainything-redis-data:/data
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      org.opencontainers.image.title: ainything-redis
      org.opencontainers.image.description: Local Redis 7 cache/queue for ainything

# Named volumes are managed by the runtime:
#   - Docker:  docker volume ls       (in the default `ainything` engine)
#   - Podman:  podman volume ls       (rootless, in $HOME/.local/share/containers)
# To reset infra cleanly: `pnpm infra:down -- -v`
volumes:
  ainything-postgres-data:
  ainything-redis-data:
