# Kubernetes Service Account and RBAC for Ainything
# Follows least privilege principle

apiVersion: v1
kind: ServiceAccount
metadata:
  name: Ainything
  namespace: Ainything
  labels:
    app: Ainything

---
# Role for Ainything deployment
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: Ainything-role
  namespace: Ainything
rules:
  - apiGroups: ['']
    resources: ['configmaps', 'secrets']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['']
    resources: ['pods']
    verbs: ['get', 'list']

---
# RoleBinding for Ainything service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: Ainything-role-binding
  namespace: Ainything
subjects:
  - kind: ServiceAccount
    name: Ainything
    namespace: Ainything
roleRef:
  kind: Role
  name: Ainything-role
  apiGroup: rbac.authorization.k8s.io

---
# ClusterRole for monitoring (read-only metrics)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: Ainything-monitoring-role
rules:
  - apiGroups: ['']
    resources: ['pods', 'services', 'endpoints']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['metrics.k8s.io']
    resources: ['pods', 'nodes']
    verbs: ['get', 'list', 'watch']

---
# ClusterRoleBinding for monitoring
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: Ainything-monitoring-role-binding
subjects:
  - kind: ServiceAccount
    name: Ainything
    namespace: Ainything
roleRef:
  kind: ClusterRole
  name: Ainything-monitoring-role
  apiGroup: rbac.authorization.k8s.io
