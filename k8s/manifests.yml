# Kubernetes Manifests for Ainything
# Optimized for Podman/Docker deployment

apiVersion: v1
kind: Namespace
metadata:
  name: Ainything
  labels:
    app: Ainything
    managed-by: k6-load-testing

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: Ainything-config
  namespace: Ainything
data:
  NODE_ENV: 'production'
  USE_MOCK_BACKEND: 'false'
  SESSION_SECRET: 'change-me-in-production-use-secrets-manager'
  DATABASE_URL: 'postgresql://postgres:password@postgres:5432/Ainything'
  DIRECT_URL: 'postgresql://postgres:password@postgres:5432/Ainything?sslmode=disable'
  REDIS_URL: 'redis://redis:6379'
  AUTH_PROVIDER: 'mock'
  LLM_PROVIDER: 'mock'
  AI_DAILY_CAP: '500'
  EMBEDDING_ENABLED: 'false'

---
# Secret for sensitive configuration
apiVersion: v1
kind: Secret
metadata:
  name: Ainything-secrets
  namespace: Ainything
type: Opaque
stringData:
  SESSION_SECRET: 'production-session-secret-rotate-regularly'
  DATABASE_URL: 'postgresql://postgres:password@postgres:5432/Ainything'
  DIRECT_URL: 'postgresql://postgres:password@postgres:5432/Ainything?sslmode=disable'
  REDIS_URL: 'redis://redis:6379'

---
# PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: Ainything
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: password
            - name: POSTGRES_DB
              value: Ainything
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ['ReadWriteOnce']
        resources:
          requests:
            storage: 10Gi

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: Ainything
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres

---
# Redis StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: Ainything
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: Ainything
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      name: redis

---
# Ainything Application Deployment (part 1/2)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: Ainything
  namespace: Ainything
spec:
  replicas: 3
  selector:
    matchLabels:
      app: Ainything
  template:
    metadata:
      labels:
        app: Ainything
    spec:
      containers:
        - name: Ainything
          image: Ainything:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: Ainything-config
            - secretRef:
                name: Ainything-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: '256Mi'
              cpu: '250m'
            limits:
              memory: '512Mi'
              cpu: '500m'

---
# Ainything Service
apiVersion: v1
kind: Service
metadata:
  name: Ainything
  namespace: Ainything
spec:
  selector:
    app: Ainything
  ports:
    - port: 80
      targetPort: 3000
      name: http
  type: ClusterIP

---
# Ainything Ingress (optional - for external access)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: Ainything
  namespace: Ainything
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: Ainything.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: Ainything
                port:
                  number: 80

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: Ainything-hpa
  namespace: Ainything
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: Ainything
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  type: ClusterIP
