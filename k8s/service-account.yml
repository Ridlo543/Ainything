# Kubernetes Service Account for Lingua
# Separate file for Service Account configuration

apiVersion: v1
kind: ServiceAccount
metadata:
  name: lingua
  namespace: lingua
  labels:
    app: lingua

---
# Annotations for service account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lingua-monitoring
  namespace: lingua
  labels:
    app: lingua
    component: monitoring
