# Kubernetes Service Account for Ainything
# Separate file for Service Account configuration

apiVersion: v1
kind: ServiceAccount
metadata:
  name: Ainything
  namespace: Ainything
  labels:
    app: Ainything

---
# Annotations for service account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: Ainything-monitoring
  namespace: Ainything
  labels:
    app: Ainything
    component: monitoring
