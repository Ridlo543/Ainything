# Kubernetes Secrets Management for Lingua
# Production-grade secret handling

apiVersion: v1
kind: Secret
metadata:
  name: lingua-db-credentials
  namespace: lingua
type: Opaque
stringData:
  POSTGRES_USER: postgres
  # Rotate this regularly in production
  POSTGRES_PASSWORD: production-password-change-me-rotate-every-90-days
  POSTGRES_DB: lingua

---
apiVersion: v1
kind: Secret
metadata:
  name: lingua-session-secret
  namespace: lingua
type: Opaque
stringData:
  # Use: openssl rand -base64 32
  SESSION_SECRET: production-session-secret-rotate-regularly-32-chars-min

---
apiVersion: v1
kind: Secret
metadata:
  name: lingua-redis-auth
  namespace: lingua
type: Opaque
stringData:
  # Redis 7+ requires authentication
  REDIS_PASSWORD: production-redis-password-change-me

---
apiVersion: v1
kind: Secret
metadata:
  name: lingua-api-keys
  namespace: lingua
type: Opaque
stringData:
  # Fill these with your actual API keys
  OPENAI_API_KEY: your-openai-api-key-here
  ANTHROPIC_API_KEY: your-anthropic-api-key-here
  TOKENROUTER_API_KEY: your-tokenrouter-api-key-here

---
# Certificate for HTTPS (optional - use cert-manager in production)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lingua-tls
  namespace: lingua
spec:
  secretName: lingua-tls-secret
  duration: 2160h  # 90 days
  renewBefore: 360h  # 15 days before expiration
  subject:
    organizations:
      - Lingua
  usages:
    - server auth
    - client auth
  dnsNames:
    - lingua.example.com
    - '*.lingua.example.com'
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
    group: cert-manager.io
