# Helm Chart for Lingua
# Simplified Kubernetes deployment with Helm

apiVersion: v2
name: lingua
description: QR-based AI menu assistant for tourist-heavy restaurants
type: application
version: 0.1.0
appVersion: '1.0.0'
keywords:
  - restaurant
  - ai
  - qr-menu
  - multilingual
maintainers:
  - name: Lingua Team
    url: https://lingua.app

dependencies:
  - name: postgresql
    version: 12.5.4
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 17.9.1
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled

# Values configuration
# This file is part of the Helm chart package
# Run: helm install lingua . -f values.yaml
