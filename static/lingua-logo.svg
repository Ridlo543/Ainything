<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Background circle with subtle gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="190" fill="url(#bgGrad)" />
  
  <!-- QR Code pattern - top left finder pattern -->
  <rect x="80" y="80" width="70" height="70" rx="8" fill="white" />
  <rect x="92" y="92" width="46" height="46" rx="4" fill="#0ea5e9" />
  <rect x="104" y="104" width="22" height="22" rx="3" fill="white" />
  
  <!-- QR Code pattern - top right finder pattern -->
  <rect x="250" y="80" width="70" height="70" rx="8" fill="white" />
  <rect x="262" y="92" width="46" height="46" rx="4" fill="#0ea5e9" />
  <rect x="274" y="104" width="22" height="22" rx="3" fill="white" />
  
  <!-- QR Code pattern - bottom left finder pattern -->
  <rect x="80" y="250" width="70" height="70" rx="8" fill="white" />
  <rect x="92" y="262" width="46" height="46" rx="4" fill="#0ea5e9" />
  <rect x="104" y="274" width="22" height="22" rx="3" fill="white" />
  
  <!-- Small QR data modules -->
  <rect x="170" y="80" width="20" height="20" rx="3" fill="white" opacity="0.9" />
  <rect x="200" y="80" width="20" height="20" rx="3" fill="white" opacity="0.9" />
  <rect x="170" y="110" width="20" height="20" rx="3" fill="white" opacity="0.9" />
  <rect x="80" y="170" width="20" height="20" rx="3" fill="white" opacity="0.9" />
  <rect x="110" y="170" width="20" height="20" rx="3" fill="white" opacity="0.9" />
  <rect x="80" y="200" width="20" height="20" rx="3" fill="white" opacity="0.9" />
  
  <!-- Chat bubble - representing AI assistant (bottom right area) -->
  <path d="M 180 180 L 310 180 Q 330 180 330 200 L 330 280 Q 330 300 310 300 L 240 300 L 210 320 L 220 300 L 180 300 Q 160 300 160 280 L 160 200 Q 160 180 180 180 Z" fill="white" />
  
  <!-- Chat message lines inside bubble -->
  <rect x="190" y="205" width="110" height="14" rx="7" fill="#0ea5e9" />
  <rect x="190" y="230" width="80" height="14" rx="7" fill="#0ea5e9" />
  <rect x="190" y="255" width="95" height="14" rx="7" fill="#0ea5e9" />
</svg>
