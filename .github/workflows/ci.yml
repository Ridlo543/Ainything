name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Typecheck + lint + unit tests
  # ---------------------------------------------------------------------------
  check:
    name: Check & Unit Tests
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ainything
          POSTGRES_PASSWORD: ainything
          POSTGRES_DB: ainything
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ainything"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ainything_app:ainything_app@127.0.0.1:5432/ainything
      DIRECT_URL: postgresql://ainything:ainything@127.0.0.1:5432/ainything
      RUN_DB_TESTS: 'true'
      PUBLIC_APP_URL: http://localhost:5173
      PUBLIC_SUPABASE_URL: http://localhost:54321
      PUBLIC_SUPABASE_ANON_KEY: stub
      SUPABASE_SERVICE_ROLE_KEY: stub
      PUBLIC_SENTRY_DSN: stub
      AI_PROVIDER: mock
      OCR_PROVIDER: mock
      WHATSAPP_PROVIDER: mock

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations and seed
        run: pnpm db:seed
        env:
          DIRECT_URL: postgresql://ainything:ainything@127.0.0.1:5432/ainything

      - name: Typecheck
        run: pnpm run check

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test:unit -- --run

  # ---------------------------------------------------------------------------
  # Build — verifies the SvelteKit app compiles to a deployable bundle
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: check

    env:
      PUBLIC_APP_URL: http://localhost:5173
      PUBLIC_SUPABASE_URL: http://localhost:54321
      PUBLIC_SUPABASE_ANON_KEY: stub
      SUPABASE_SERVICE_ROLE_KEY: stub
      PUBLIC_SENTRY_DSN: stub
      AI_PROVIDER: mock
      OCR_PROVIDER: mock
      WHATSAPP_PROVIDER: mock

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ github.sha }}
          path: build/
          retention-days: 3

  # ---------------------------------------------------------------------------
  # E2E tests — runs against the built app with a real Postgres
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E Tests
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'push' || github.event.pull_request.draft == false

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ainything
          POSTGRES_PASSWORD: ainything
          POSTGRES_DB: ainything
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ainything"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ainything_app:ainything_app@127.0.0.1:5432/ainything
      DIRECT_URL: postgresql://ainything:ainything@127.0.0.1:5432/ainything
      PUBLIC_APP_URL: http://localhost:4173
      PUBLIC_SUPABASE_URL: http://localhost:54321
      PUBLIC_SUPABASE_ANON_KEY: stub
      SUPABASE_SERVICE_ROLE_KEY: stub
      AI_PROVIDER: mock
      OCR_PROVIDER: mock
      WHATSAPP_PROVIDER: mock
      ORIGIN: http://localhost:4173

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations and seed
        run: pnpm db:migrate && pnpm db:seed
        env:
          DIRECT_URL: postgresql://ainything:ainything@127.0.0.1:5432/ainything

      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: build-${{ github.sha }}
          path: build/

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 7
