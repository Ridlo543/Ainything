name: CI / Build / Deploy

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ainything-app
  MIGRATE_IMAGE_NAME: ${{ github.repository_owner }}/ainything-migrate

jobs:
  check:
    name: Type check & unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ainything_test
          POSTGRES_PASSWORD: ainything_test
          POSTGRES_DB: ainything_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://ainything_test:ainything_test@localhost:5432/ainything_test
      REDIS_URL: redis://localhost:6379
      AUTH_PROVIDER: credentials
      SESSION_SECRET: ci-test-secret-32-chars-minimum-x
      LLM_PROVIDER: mock
      OCR_PROVIDER: mock
      WHATSAPP_PROVIDER: mock
      STORAGE_PROVIDER: mock
      EMBEDDING_ENABLED: 'false'
      RUN_DB_TESTS: 'true'
      PUBLIC_APP_URL: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: node scripts/db.mjs migrate

      - run: pnpm check

      - run: pnpm test:unit -- --run
