name: CI / Build / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ainything-app

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Type check + unit tests
  # Must pass before image is built — gates every push to main
  # ---------------------------------------------------------------------------
  check:
    name: Type check & unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ainything_app
          POSTGRES_PASSWORD: ainything_app
          POSTGRES_DB: ainything
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://ainything_app:ainything_app@localhost:5432/ainything
      DIRECT_URL: postgresql://ainything_app:ainything_app@localhost:5432/ainything
      REDIS_URL: redis://localhost:6379
      AUTH_PROVIDER: credentials
      SESSION_SECRET: ci-test-secret-not-real
      LLM_PROVIDER: mock
      OCR_PROVIDER: mock
      WHATSAPP_PROVIDER: mock
      STORAGE_PROVIDER: mock
      EMBEDDING_ENABLED: "false"
      RUN_DB_TESTS: "true"
      PUBLIC_APP_URL: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: node scripts/db.mjs migrate

      - name: Type check
        run: pnpm check

      - name: Unit tests
        run: pnpm test:unit

  # ---------------------------------------------------------------------------
  # Job 2: Build + push image to GHCR
  # Only runs on push to main (not on PRs) and only if check job passes
  # ---------------------------------------------------------------------------
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PUBLIC_SENTRY_DSN=${{ secrets.PUBLIC_SENTRY_DSN }}

  # ---------------------------------------------------------------------------
  # Job 3: Deploy — pull new image on VPS via SSH
  # Only runs after image is built and pushed successfully
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://ainything.online

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/ainything
            docker pull ghcr.io/${{ github.repository_owner }}/ainything-app:latest
            docker compose up -d --no-deps app
            docker compose ps
