# Docker Compose for Lingua
# Optimized for Podman/Docker local development

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lingua-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lingua
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lingua-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  lingua:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lingua-app
    environment:
      NODE_ENV: development
      USE_MOCK_BACKEND: 'true'
      SESSION_SECRET: dev-session-secret-change-me
      DATABASE_URL: postgresql://postgres:password@postgres:5432/lingua
      DIRECT_URL: postgresql://postgres:password@postgres:5432/lingua?sslmode=disable
      REDIS_URL: redis://redis:6379
      AUTH_PROVIDER: mock
      LLM_PROVIDER: mock
      AI_DAILY_CAP: 500
      EMBEDDING_ENABLED: 'false'
      PUBLIC_APP_URL: http://localhost:5173
    ports:
      - '5173:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./.svelte-kit:/app/node_modules/.svelte-kit
      - ./package.json:/app/package.json
    restart: unless-stopped

volumes:
  postgres-data:
