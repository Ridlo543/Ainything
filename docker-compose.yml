services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lingua-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lingua
      POSTGRES_USER: lingua
      POSTGRES_PASSWORD: lingua
    ports:
      - '5432:5432'
    volumes:
      - lingua-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lingua -d lingua']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lingua-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - lingua-redis-data:/data
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lingua-postgres-data:
  lingua-redis-data:
